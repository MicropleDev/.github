# Reusable workflow for cutting a STABLE Python tarball release.
#
# Used by superdog and superdog-listener (W4 migrations merged via
# MicropleDev/superdog#21 + MicropleDev/superdog-listener#28). Per-repo
# wrapper example:
#
#   # .github/workflows/release.yml in a consumer repo
#   name: Release
#   permissions:
#     contents: write
#   on:
#     workflow_dispatch:
#       inputs:
#         bump_type:
#           type: choice
#           options: [patch, minor, major]
#           required: true
#   jobs:
#     release:
#       uses: MicropleDev/.github/.github/workflows/python-tarball-release.yml@<sha>
#       with:
#         package_name: superdog
#         python_version: "3.13"
#         bump_type: ${{ inputs.bump_type }}
#         environment: stable-release
#       secrets: inherit
#
# Per-repo packaging: the caller MUST provide an executable script at
# `scripts/build-bundle.sh` in the consumer repo. The reusable workflow
# invokes it with these env vars set:
#
#   PACKAGE_NAME  — e.g. "superdog"
#   VERSION       — e.g. "0.2.0" or "0.2.1-dev.20260619.abc1234"
#   BUNDLE_DIR    — staging dir, e.g. dist/superdog-0.2.0
#   ASSET_PATH    — output, e.g. dist/superdog-0.2.0.tar.zst
#
# The script is responsible for: any extra apt installs, creating the venv,
# pip install, copying source files into BUNDLE_DIR, optionally pre-downloading
# models, then producing ASSET_PATH + ASSET_PATH.sha256. The reusable workflow
# then signs ASSET_PATH with minisign and publishes the release.

name: Python tarball release (stable)

on:
  workflow_call:
    inputs:
      package_name:
        description: "Package name, used in tag/asset naming (e.g. 'superdog')."
        required: true
        type: string
      python_version:
        description: "Python version (e.g. '3.13')."
        required: true
        type: string
      bump_type:
        description: "Semver bump applied to the latest v{x.y.z} tag."
        required: true
        type: string  # patch | minor | major
      runner:
        description: >-
          Runner image. Default 'ubuntu-24.04-arm' is GitHub's hosted
          Linux ARM64 runner (Ampere; rolled out 2024-25) — chosen
          because the Python services ship a venv with native deps that
          must match the Pi's arm64 architecture. Requires the org to
          have access to ARM runners; if your org doesn't, pass
          'ubuntu-24.04' instead (x86_64 venv, won't run on the Pi but
          will at least let CI complete for non-deploy testing). Other
          valid labels: any self-hosted runner the consumer org defines.
        required: false
        type: string
        default: "ubuntu-24.04-arm"
      environment:
        description: >-
          Optional GH Actions environment (e.g. 'stable-release') for
          env-protected stable signing secrets. Default empty = no env.
        required: false
        type: string
        default: ""
    outputs:
      version:
        value: ${{ jobs.release.outputs.version }}
      tag:
        value: ${{ jobs.release.outputs.tag }}

permissions:
  contents: write

concurrency:
  group: python-tarball-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Validate bump_type
        run: |
          case "${{ inputs.bump_type }}" in
            patch|minor|major) ;;
            *) echo "::error::bump_type must be patch|minor|major, got '${{ inputs.bump_type }}'"; exit 1 ;;
          esac

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # need full tag history for version derivation

      - name: Refuse if HEAD already has a stable tag
        run: |
          set -euo pipefail
          if EXISTING=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1); [ -n "$EXISTING" ]; then
            echo "::error::HEAD already has stable tag $EXISTING. Refuse to cut another stable on the same commit. Resolve manually (re-upload release assets to $EXISTING, or delete the partial tag and rerun)."
            exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Compute version (from latest v{x.y.z} tag + bump)
        id: version
        run: |
          set -euo pipefail
          LATEST=$(git tag -l 'v*.*.*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          BASE=${LATEST#v}
          BASE=${BASE:-0.0.0}
          IFS='.' read -r MAJ MIN PAT <<<"$BASE"
          case "${{ inputs.bump_type }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          VERSION="${MAJ}.${MIN}.${PAT}"
          TAG="v${VERSION}"
          GIT_COMMIT=$(git rev-parse HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "git_commit=$GIT_COMMIT"
            echo "build_date=$BUILD_DATE"
          } >> "$GITHUB_OUTPUT"
          echo "Computed stable: $TAG (from base v${BASE}, bump=${{ inputs.bump_type }})"

      - name: Refuse to overwrite an existing tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Pick a different bump_type."
            exit 1
          fi

      - name: Write VERSION + BUILD files for the bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GIT_COMMIT: ${{ steps.version.outputs.git_commit }}
          BUILD_DATE: ${{ steps.version.outputs.build_date }}
        run: |
          set -euo pipefail
          echo "$VERSION" > VERSION
          printf '{"git_commit": "%s", "build_date": "%s"}\n' "${GIT_COMMIT:0:7}" "$BUILD_DATE" > BUILD

      - name: Verify per-repo build-bundle.sh exists
        run: |
          set -euo pipefail
          if [ ! -x scripts/build-bundle.sh ]; then
            echo "::error::Expected an executable scripts/build-bundle.sh in this repo. The reusable Python release workflow delegates per-repo packaging there. See MicropleDev/.github docs/release-scheme.md for the contract."
            exit 1
          fi

      - name: Build bundle (per-repo)
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION: ${{ steps.version.outputs.version }}
          BUNDLE_DIR: dist/${{ inputs.package_name }}-${{ steps.version.outputs.version }}
          ASSET_PATH: dist/${{ inputs.package_name }}-${{ steps.version.outputs.version }}.tar.zst
        run: |
          set -euo pipefail
          mkdir -p dist
          scripts/build-bundle.sh
          if [ ! -f "$ASSET_PATH" ]; then
            echo "::error::scripts/build-bundle.sh did not produce $ASSET_PATH"
            exit 1
          fi
          if [ ! -f "${ASSET_PATH}.sha256" ]; then
            echo "::error::scripts/build-bundle.sh did not produce ${ASSET_PATH}.sha256"
            exit 1
          fi
          echo "asset=$(basename "$ASSET_PATH")" >> "$GITHUB_ENV"

      - name: Sign artifact (stable key)
        # Same-repo internal action. The `uses:` keyword doesn't allow
        # github-context expressions when this workflow is invoked as a
        # `workflow_call` reusable workflow (GH resolves uses: at parse
        # time before contexts are available — would emit "Unrecognized
        # named-value: 'github'"). So we use @main here and accept that
        # callers pinning the workflow to a tag/SHA still get the action
        # at current main. When MicropleDev/.github starts cutting tagged
        # releases, switch this to the same tag the workflow lives at.
        uses: MicropleDev/.github/.github/actions/minisign-sign@main
        with:
          asset_path: dist/${{ env.asset }}
          key: ${{ secrets.WDOS_STABLE_MINISIGN_KEY }}
          password: ${{ secrets.WDOS_STABLE_MINISIGN_PASSWORD }}
          trusted_comment: "${{ inputs.package_name }} ${{ steps.version.outputs.tag }} (stable)"

      - name: Create + push tag
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ inputs.package_name }} ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ inputs.package_name }} ${{ steps.version.outputs.tag }}"
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/${{ env.asset }}
            dist/${{ env.asset }}.sha256
            dist/${{ env.asset }}.minisig
