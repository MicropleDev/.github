# Composite action: sign a file with minisign, producing a sibling .minisig.
#
# Inputs are passed as workflow secrets — the action expects the contents of
# the secret key file (NOT a path) and the password protecting it. Caller
# pattern (most common — see docs/SIGNING.md):
#
#   - uses: MicropleDev/.github/.github/actions/minisign-sign@main
#     with:
#       asset_path: dist/heisenberg-0.1.0-linux-arm64
#       key: ${{ secrets.WDOS_DEV_MINISIGN_KEY }}
#       password: ${{ secrets.WDOS_DEV_MINISIGN_PASSWORD }}
#
# Produces dist/heisenberg-0.1.0-linux-arm64.minisig.
#
# Tracks: MicropleDev/watchdog-os#60 (W7) and #61 (W8).

name: Minisign sign artifact
description: >-
  Sign a file with minisign, producing a sibling .minisig sidecar.
  Requires a Debian/Ubuntu runner (uses apt-get to install minisign, plus
  GNU coreutils — readlink -f, stat -c). Use runs-on: ubuntu-* on the
  invoking job.

inputs:
  asset_path:
    description: Path to the file to sign. Signature lands at ${asset_path}.minisig.
    required: true
  key:
    description: Contents of the minisign secret key file (NOT a path). Pass via secrets.
    required: true
  password:
    description: Password protecting the secret key. Pass via secrets.
    required: true
  trusted_comment:
    description: Optional trusted comment baked into the signature. Defaults to "<basename> signed at <ISO8601>".
    required: false
    default: ""

outputs:
  signature_path:
    description: Absolute path to the produced .minisig file.
    value: ${{ steps.sign.outputs.signature_path }}

runs:
  using: composite
  steps:
    - name: Verify runner is Debian/Ubuntu
      shell: bash
      run: |
        set -euo pipefail
        # The install step uses apt-get; the sign step uses GNU readlink -f
        # and stat -c. Fail fast with a clear message instead of cryptic
        # "command not found" or unexpected stat output on macOS/RHEL/etc.
        if [ "${RUNNER_OS:-}" != "Linux" ]; then
          echo "::error::minisign-sign requires a Linux runner. Got RUNNER_OS='${RUNNER_OS:-unset}'. Use 'runs-on: ubuntu-latest' (or another ubuntu-* image)."
          exit 1
        fi
        if ! command -v apt-get >/dev/null 2>&1; then
          echo "::error::minisign-sign requires apt-get (Debian/Ubuntu). Not found on this runner. Use 'runs-on: ubuntu-*' or a Debian/Ubuntu container."
          exit 1
        fi
        # sudo is only needed when we're not already running as root.
        # Container images often run as root without sudo installed — fine.
        if [ "$(id -u)" -ne 0 ] && ! command -v sudo >/dev/null 2>&1; then
          echo "::error::minisign-sign needs to install minisign via apt-get. When not running as root, sudo is required. Either run the job as root (most container images do) or use a runner with sudo (standard GitHub-hosted ubuntu-* runners)."
          exit 1
        fi

    - name: Validate inputs
      shell: bash
      env:
        MINISIGN_KEY: ${{ inputs.key }}
        MINISIGN_PASSWORD: ${{ inputs.password }}
        ASSET_PATH: ${{ inputs.asset_path }}
      run: |
        set -euo pipefail
        if [ -z "$MINISIGN_KEY" ]; then
          echo "::error::input 'key' is empty — make sure the WDOS_{STABLE,DEV}_MINISIGN_KEY secret is set on the caller and that the caller passes 'secrets: inherit' (or names the secret explicitly)."
          exit 1
        fi
        if [ -z "$MINISIGN_PASSWORD" ]; then
          echo "::error::input 'password' is empty — make sure the matching _PASSWORD secret is set."
          exit 1
        fi
        if [ ! -f "$ASSET_PATH" ]; then
          echo "::error::asset_path '$ASSET_PATH' is not a file. Did the build step fail or produce a different name?"
          exit 1
        fi

    - name: Install minisign
      shell: bash
      run: |
        set -euo pipefail
        if command -v minisign >/dev/null 2>&1; then
          echo "minisign already installed: $(minisign -v 2>&1 | head -n1)"
          exit 0
        fi
        # Use sudo only when not already root (skips on root containers
        # that lack sudo).
        SUDO=""
        if [ "$(id -u)" -ne 0 ]; then
          SUDO="sudo"
        fi
        $SUDO apt-get update -qq
        $SUDO apt-get install -qq -y minisign
        minisign -v 2>&1 | head -n1

    - name: Sign
      id: sign
      shell: bash
      env:
        MINISIGN_KEY: ${{ inputs.key }}
        MINISIGN_PASSWORD: ${{ inputs.password }}
        ASSET_PATH: ${{ inputs.asset_path }}
        TRUSTED_COMMENT: ${{ inputs.trusted_comment }}
      run: |
        set -euo pipefail

        # Write key to a 0600 temp file. Use mktemp so the path is fresh per
        # run; trap deletes it on exit/failure. shred preferred if available
        # to make filesystem recovery harder, falls back to rm.
        KEY_FILE=$(mktemp)
        cleanup() { command -v shred >/dev/null 2>&1 && shred -u "$KEY_FILE" 2>/dev/null || rm -f "$KEY_FILE"; }
        trap cleanup EXIT

        # Defensively ensure a trailing newline. Some pasteboards strip
        # the final LF when copying out of editors — minisign tolerates
        # missing trailing newlines but the diagnostic below is cleaner
        # when it's present.
        printf '%s\n' "$MINISIGN_KEY" > "$KEY_FILE"
        chmod 600 "$KEY_FILE"

        # Validate file shape BEFORE handing to minisign so the user gets
        # an actionable error instead of minisign's opaque "Error while
        # loading the secret key file". Counts and the first byte are
        # safe to print — they're not enough to leak the key, but they
        # cover the common paste mistakes.
        LINE_COUNT=$(wc -l < "$KEY_FILE")
        BYTE_COUNT=$(wc -c < "$KEY_FILE")
        FIRST_LINE_BYTES=$(head -n 1 "$KEY_FILE" | wc -c | tr -d ' ')
        FIRST_BYTE_HEX=$(head -c 1 "$KEY_FILE" | od -An -tx1 | tr -d ' \n')
        FIRST_LINE=$(head -n 1 "$KEY_FILE")

        echo "Key file diagnostic:"
        echo "  lines: $LINE_COUNT"
        echo "  total bytes: $BYTE_COUNT"
        echo "  first line bytes: $FIRST_LINE_BYTES"
        echo "  first byte (hex): $FIRST_BYTE_HEX (expected 75 = 'u')"

        case "$FIRST_LINE" in
          "untrusted comment: minisign"*) ;;
          *)
            echo "::error::WDOS_*_MINISIGN_KEY secret value doesn't look like a minisign key file."
            echo "::error::"
            echo "::error::Expected: a 2-line file"
            echo "::error::  Line 1: 'untrusted comment: minisign encrypted secret key' (49 chars)"
            echo "::error::  Line 2: base64 key starting with 'RW' (~90 chars)"
            echo "::error::"
            echo "::error::From this run: $LINE_COUNT line(s), $BYTE_COUNT total bytes, first byte=0x$FIRST_BYTE_HEX (expected 0x75='u')."
            case "$FIRST_BYTE_HEX" in
              22) echo "::error::First byte is '\"' (0x22) — pasted with surrounding quotes. Remove them when updating the secret." ;;
              27) echo "::error::First byte is \"'\" (0x27) — pasted with surrounding quotes. Remove them when updating the secret." ;;
              20|09) echo "::error::First byte is whitespace (0x$FIRST_BYTE_HEX) — strip leading whitespace before pasting." ;;
              ef) echo "::error::First byte is 0xEF — likely UTF-8 BOM (0xEF 0xBB 0xBF). Strip the BOM (some editors add it on save)." ;;
              52) echo "::error::First byte is 'R' (0x52) — looks like you pasted only the base64 line, missing the 'untrusted comment:' header line. Include the full file." ;;
              "") echo "::error::Couldn't read first byte — file may be empty or unreadable." ;;
              *) echo "::error::Unexpected first byte. Verify locally: 'head -c 5 wdos-dev.key' should print 'untru'." ;;
            esac
            echo "::error::"
            echo "::error::To re-paste correctly: open wdos-dev.key in a plain editor, select all, copy, paste into the secret value. Don't add quotes, don't escape newlines."
            exit 1
            ;;
        esac
        if [ "$LINE_COUNT" -lt 2 ]; then
          echo "::error::Key file is only $LINE_COUNT line(s). A minisign key has 2 (comment + base64)."
          echo "::error::Most likely the secret was pasted with literal '\\n' (backslash-n) instead of actual newlines. Re-paste preserving real line breaks."
          exit 1
        fi

        # Default trusted comment if caller didn't supply one. Trusted
        # comment is part of the signed payload — gets cryptographically
        # bound to the file.
        if [ -z "$TRUSTED_COMMENT" ]; then
          TRUSTED_COMMENT="$(basename "$ASSET_PATH") signed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        fi

        # minisign reads the password from stdin when stdin is not a TTY.
        # Pipe the password and use -t for the trusted comment.
        printf '%s\n' "$MINISIGN_PASSWORD" | minisign -Sm "$ASSET_PATH" -s "$KEY_FILE" -t "$TRUSTED_COMMENT"

        SIG_PATH="${ASSET_PATH}.minisig"
        if [ ! -f "$SIG_PATH" ]; then
          echo "::error::Expected signature at $SIG_PATH not found after minisign -S"
          exit 1
        fi
        # Resolve to an absolute path so the signature_path output matches the
        # action's documented contract regardless of whether asset_path was
        # passed relative or absolute by the caller.
        ABS_SIG_PATH=$(readlink -f "$SIG_PATH")
        echo "signature_path=$ABS_SIG_PATH" >> "$GITHUB_OUTPUT"
        echo "::notice::Signed: $ABS_SIG_PATH ($(stat -c%s "$ABS_SIG_PATH") bytes)"
